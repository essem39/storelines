name: Update Products Feed

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Run feed converter
        run: python3 scripts/update_feed.py

      - name: Commit if changed
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add data/products.json
          git diff --cached --quiet || git commit -m "chore: update products feed $(date +%Y-%m-%d)"
          git push
