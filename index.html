<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Xiaomi Store — официальные товары</title>
<meta name="description" content="Официальные товары Xiaomi, Redmi и POCO. Смартфоны, умный дом, аксессуары с доставкой по России.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --mi-orange:#ff6900;
  --mi-orange-dark:#e55e00;
  --mi-black:#1a1a1a;
  --mi-gray:#f5f5f5;
  --mi-gray2:#e8e8e8;
  --mi-text:#333;
  --mi-muted:#888;
  --radius:8px;
}
body{font-family:'Roboto',sans-serif;background:#fff;color:var(--mi-text);min-height:100vh}

/* HEADER */
header{background:var(--mi-black);position:sticky;top:0;z-index:100}
.header-inner{max-width:1200px;margin:0 auto;padding:0 20px;display:flex;align-items:center;height:56px;gap:24px}
.logo{display:flex;align-items:center;gap:8px;text-decoration:none}
.logo-mi{background:var(--mi-orange);color:#fff;font-weight:700;font-size:20px;width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:4px;letter-spacing:-1px}
.logo-text{color:#fff;font-size:15px;font-weight:300;letter-spacing:1px}
.search-wrap{flex:1;max-width:480px;position:relative}
.search-wrap input{width:100%;padding:9px 16px 9px 40px;border:none;border-radius:20px;background:#2d2d2d;color:#fff;font-size:14px;outline:none}
.search-wrap input::placeholder{color:#666}
.search-wrap svg{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:#666}
.header-right{margin-left:auto;color:#ccc;font-size:13px}

/* HERO BANNER */
.hero{background:linear-gradient(135deg,#1a1a1a 0%,#2a2a2a 50%,#1a1a1a 100%);padding:48px 20px;text-align:center;position:relative;overflow:hidden}
.hero::before{content:'';position:absolute;top:-50%;left:-50%;width:200%;height:200%;background:radial-gradient(ellipse at 70% 50%,rgba(255,105,0,0.15) 0%,transparent 60%)}
.hero-inner{max-width:1200px;margin:0 auto;position:relative}
.hero h1{color:#fff;font-size:clamp(28px,4vw,52px);font-weight:300;letter-spacing:-0.5px;margin-bottom:8px}
.hero h1 span{color:var(--mi-orange);font-weight:700}
.hero p{color:#aaa;font-size:16px;font-weight:300}

/* CATEGORIES */
.cats-bar{background:var(--mi-gray);border-bottom:1px solid var(--mi-gray2)}
.cats-inner{max-width:1200px;margin:0 auto;padding:0 20px;display:flex;gap:4px;overflow-x:auto;scrollbar-width:none}
.cats-inner::-webkit-scrollbar{display:none}
.cat-btn{padding:14px 18px;border:none;background:none;font-size:13px;font-family:'Roboto',sans-serif;color:var(--mi-muted);cursor:pointer;white-space:nowrap;border-bottom:2px solid transparent;transition:all .2s}
.cat-btn:hover{color:var(--mi-orange)}
.cat-btn.active{color:var(--mi-orange);border-bottom-color:var(--mi-orange);font-weight:500}

/* TOOLBAR */
.toolbar{max-width:1200px;margin:0 auto;padding:16px 20px;display:flex;align-items:center;justify-content:space-between}
.count{font-size:13px;color:var(--mi-muted)}
.sort-wrap select{padding:7px 12px;border:1px solid var(--mi-gray2);border-radius:var(--radius);font-size:13px;font-family:'Roboto',sans-serif;color:var(--mi-text);background:#fff;cursor:pointer;outline:none}

/* GRID */
.grid-wrap{max-width:1200px;margin:0 auto;padding:0 20px 48px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:16px}

/* CARD */
.card{background:#fff;border:1px solid var(--mi-gray2);border-radius:var(--radius);overflow:hidden;text-decoration:none;color:inherit;display:flex;flex-direction:column;transition:box-shadow .2s,transform .2s}
.card:hover{box-shadow:0 8px 32px rgba(0,0,0,0.12);transform:translateY(-2px)}
.card-img{aspect-ratio:1;background:var(--mi-gray);overflow:hidden;position:relative}
.card-img img{width:100%;height:100%;object-fit:contain;padding:12px;transition:transform .3s}
.card:hover .card-img img{transform:scale(1.05)}
.badge{position:absolute;top:10px;left:10px;background:var(--mi-orange);color:#fff;font-size:11px;font-weight:700;padding:3px 7px;border-radius:4px}
.card-body{padding:14px;flex:1;display:flex;flex-direction:column;gap:6px}
.card-name{font-size:13px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;color:var(--mi-text)}
.card-price{margin-top:auto;padding-top:8px}
.price-now{font-size:18px;font-weight:700;color:var(--mi-black)}
.price-old{font-size:12px;color:var(--mi-muted);text-decoration:line-through;margin-left:6px}
.card-buy{display:block;margin-top:10px;padding:9px;background:var(--mi-orange);color:#fff;font-size:13px;font-weight:500;text-align:center;border-radius:var(--radius);transition:background .2s}
.card:hover .card-buy{background:var(--mi-orange-dark)}

/* PAGINATION */
.pagination{max-width:1200px;margin:0 auto;padding:0 20px 48px;display:flex;justify-content:center;gap:8px;flex-wrap:wrap}
.page-btn{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border:1px solid var(--mi-gray2);border-radius:var(--radius);cursor:pointer;font-size:14px;background:#fff;transition:all .2s}
.page-btn:hover,.page-btn.active{background:var(--mi-orange);color:#fff;border-color:var(--mi-orange)}

/* LOADING / EMPTY */
.loading{text-align:center;padding:80px 20px;color:var(--mi-muted)}
.spinner{width:36px;height:36px;border:3px solid var(--mi-gray2);border-top-color:var(--mi-orange);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}

/* FOOTER */
footer{background:var(--mi-black);color:#777;text-align:center;padding:24px 20px;font-size:13px;margin-top:32px}
footer a{color:#aaa;text-decoration:none}
footer span{color:var(--mi-orange)}

@media(max-width:600px){
  .grid{grid-template-columns:repeat(2,1fr);gap:10px}
  .hero{padding:32px 16px}
}
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <a href="/" class="logo">
      <div class="logo-mi">mi</div>
      <span class="logo-text">Store</span>
    </a>
    <div class="search-wrap">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      <input type="text" id="searchInput" placeholder="Поиск товаров Xiaomi...">
    </div>
    <div class="header-right" id="totalCount"></div>
  </div>
</header>

<div class="hero">
  <div class="hero-inner">
    <h1>Официальные товары <span>Xiaomi</span></h1>
    <p>Смартфоны, умный дом, аксессуары — лучшие цены с доставкой по России</p>
  </div>
</div>

<div class="cats-bar">
  <div class="cats-inner" id="catsBar">
    <button class="cat-btn active" data-cat="">Все товары</button>
  </div>
</div>

<div class="toolbar">
  <div class="count" id="countLabel"></div>
  <div class="sort-wrap">
    <select id="sortSelect">
      <option value="disc">По скидке</option>
      <option value="asc">Сначала дешевле</option>
      <option value="desc">Сначала дороже</option>
    </select>
  </div>
</div>

<div class="grid-wrap">
  <div class="loading" id="loading">
    <div class="spinner"></div>
    Загружаем товары...
  </div>
  <div class="grid" id="grid" style="display:none"></div>
</div>
<div class="pagination" id="pagination"></div>

<footer>
  <p>© 2025 <span>Xiaomi Store</span> — партнёрский магазин. Все товары через официальных продавцов.<br>
  <a href="https://mi-shop.com" target="_blank" rel="nofollow">mi-shop.com</a></p>
</footer>

<script>
const PAGE_SIZE = 40;
let allProducts = [];
let filtered = [];
let currentPage = 1;
let activeCat = '';
let searchQ = '';
let sortMode = 'disc';

async function loadProducts() {
  try {
    const r = await fetch('data/products.json?v=' + Date.now());
    const d = await r.json();
    allProducts = d.products || [];
    document.getElementById('totalCount').textContent = allProducts.length + ' товаров';
    buildCats();
    applyFilters();
  } catch(e) {
    document.getElementById('loading').innerHTML = '<p>Ошибка загрузки. Попробуйте обновить страницу.</p>';
  }
}

function buildCats() {
  const bar = document.getElementById('catsBar');
  const cats = [...new Set(allProducts.map(p => p.c).filter(Boolean))].sort();
  cats.forEach(c => {
    const btn = document.createElement('button');
    btn.className = 'cat-btn';
    btn.dataset.cat = c;
    btn.textContent = c;
    btn.onclick = () => selectCat(c);
    bar.appendChild(btn);
  });
}

function selectCat(cat) {
  activeCat = cat;
  document.querySelectorAll('.cat-btn').forEach(b => b.classList.toggle('active', b.dataset.cat === cat));
  currentPage = 1;
  applyFilters();
}

function applyFilters() {
  let res = allProducts;
  if (activeCat) res = res.filter(p => p.c === activeCat);
  if (searchQ) res = res.filter(p => p.n.toLowerCase().includes(searchQ));
  if (sortMode === 'asc') res = [...res].sort((a,b) => a.p - b.p);
  else if (sortMode === 'desc') res = [...res].sort((a,b) => b.p - a.p);
  else res = [...res].sort((a,b) => (b.d||0) - (a.d||0));
  filtered = res;
  document.getElementById('countLabel').textContent = res.length + ' товаров';
  renderPage();
}

function renderPage() {
  const grid = document.getElementById('grid');
  const loading = document.getElementById('loading');
  loading.style.display = 'none';
  grid.style.display = '';

  const start = (currentPage-1)*PAGE_SIZE;
  const items = filtered.slice(start, start+PAGE_SIZE);

  grid.innerHTML = items.map(p => {
    const name = p.n.length > 60 ? p.n.slice(0,60)+'…' : p.n;
    const badge = p.d > 0 ? `<div class="badge">-${p.d}%</div>` : '';
    const oldp = p.op > p.p ? `<span class="price-old">${p.op.toLocaleString('ru')} ₽</span>` : '';
    return `<a class="card" href="${p.u}" target="_blank" rel="nofollow noopener">
      <div class="card-img">
        <img src="${p.i}" alt="${name}" loading="lazy" onerror="this.style.display='none'">
        ${badge}
      </div>
      <div class="card-body">
        <div class="card-name">${name}</div>
        <div class="card-price">
          <span class="price-now">${p.p.toLocaleString('ru')} ₽</span>${oldp}
        </div>
        <div class="card-buy">Купить на mi-shop.com</div>
      </div>
    </a>`;
  }).join('');

  renderPagination();
  window.scrollTo({top:0,behavior:'smooth'});
}

function renderPagination() {
  const total = Math.ceil(filtered.length / PAGE_SIZE);
  const pag = document.getElementById('pagination');
  if (total <= 1) { pag.innerHTML = ''; return; }
  let html = '';
  const prev = currentPage > 1 ? `<div class="page-btn" onclick="goPage(${currentPage-1})">‹</div>` : '';
  const next = currentPage < total ? `<div class="page-btn" onclick="goPage(${currentPage+1})">›</div>` : '';
  let pages = [];
  for (let i=1; i<=total; i++) {
    if (i===1 || i===total || Math.abs(i-currentPage)<=2) pages.push(i);
    else if (pages[pages.length-1] !== '…') pages.push('…');
  }
  html = prev + pages.map(p => p==='…'
    ? `<div class="page-btn" style="pointer-events:none">…</div>`
    : `<div class="page-btn${p===currentPage?' active':''}" onclick="goPage(${p})">${p}</div>`
  ).join('') + next;
  pag.innerHTML = html;
}

function goPage(n) { currentPage = n; renderPage(); }

document.getElementById('searchInput').addEventListener('input', e => {
  searchQ = e.target.value.toLowerCase().trim();
  currentPage = 1;
  applyFilters();
});

document.getElementById('sortSelect').addEventListener('change', e => {
  sortMode = e.target.value;
  currentPage = 1;
  applyFilters();
});

loadProducts();
</script>
</body>
</html>
